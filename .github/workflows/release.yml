          Remove-Item "$out\dalamud.zip"
          echo "DALAMUD_HOME=$out" >> $env:GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore Slidecaster\Slidecaster.csproj

      - name: Build Release
