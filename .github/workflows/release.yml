          Write-Host "Found zip: $($zip.FullName)"
          echo "ZIP_PATH=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"      # e.g. sc-v1.0.0
          $ver = $tag -replace '^sc-v', ''      # e.g. 1.0.0
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $full = $parts -join '.'
          echo "SHORT=$ver"   >> $env:GITHUB_OUTPUT
          echo "FULL=$full"   >> $env:GITHUB_OUTPUT

      - name: Update pluginmaster.json
        shell: pwsh
        run: |
          $arr   = Get-Content pluginmaster.json -Raw | ConvertFrom-Json
          $entry = $arr | Where-Object { $_.InternalName -eq "Slidecaster" }
          $ver   = "${{ steps.version.outputs.FULL }}"
          $tag   = "${{ github.ref_name }}"
          $dlUrl = "https://github.com/Aschmies/AschyQOL/releases/download/$tag/Slidecaster-$tag.zip"

          if (-not $entry) {
            $entry = [pscustomobject]@{
              Author                 = "Market Assistant Dev"
              Name                   = "Slidecaster"
              Punchline              = "Highlights the final safe-move window while casting."
              Description            = "Adds a cast-bar overlay that marks the slidecasting timeframe so you can start moving without interrupting the cast. Includes an optional audio cue when the safe window begins."
              Changelog              = "v${{ steps.version.outputs.SHORT }}: Initial release with cast-bar safe-zone overlay, configurable timing, and optional safe-move sound cue."
              InternalName           = "Slidecaster"
              AssemblyVersion        = $ver
              TestingAssemblyVersion = $ver
              IsHide                 = $false
              IsTestingExclusive     = $false
              RepoUrl                = "https://github.com/Aschmies/AschyQOL"
              IconUrl                = "https://raw.githubusercontent.com/Aschmies/AschyQOL/main/assets/icon-market-master-pro.png"
              DownloadLinkInstall    = $dlUrl
              DownloadLinkUpdate     = $dlUrl
              DownloadLinkTesting    = $dlUrl
              DalamudApiLevel        = 15
              ApplicableVersion      = "any"
              LoadRequiredState      = 0
              LoadSync               = $false
              CanUnloadAsync         = $false
              LoadPriority           = 0
              SupportsProfiles       = $false
              AcceptsFeedback        = $true
              Tags                   = @("combat", "casting", "slidecast", "overlay")
              LastUpdated            = [System.DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
              DownloadCount          = 0
            }
            $arr = @($arr + $entry)
          } else {
            $entry.AssemblyVersion        = $ver
            $entry.TestingAssemblyVersion = $ver
            $entry.LastUpdated            = [System.DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
            $entry.DownloadLinkInstall    = $dlUrl
            $entry.DownloadLinkUpdate     = $dlUrl
            $entry.DownloadLinkTesting    = $dlUrl
          }

          $json = ConvertTo-Json -InputObject $arr -Depth 10
          [System.IO.File]::WriteAllText("$PWD\pluginmaster.json", $json, [System.Text.Encoding]::UTF8)

      - name: Rename zip for release
        id: rename_zip
        shell: pwsh
        run: |
          $src  = "${{ steps.find_zip.outputs.ZIP_PATH }}"
          $dest = Join-Path (Split-Path $src) "Slidecaster-${{ github.ref_name }}.zip"
          Rename-Item $src $dest
          Write-Host "Renamed to: $dest"
          echo "RELEASE_ZIP=$dest" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ### Slidecaster ${{ steps.version.outputs.SHORT }}

            **Install:** Add the custom repo URL to Dalamud (see README), then install "Slidecaster".
            **Update:** Click the Update button next to the plugin in the Dalamud plugin installer.
          files: ${{ steps.rename_zip.outputs.RELEASE_ZIP }}
          fail_on_unmatched_files: true

      - name: Commit updated pluginmaster.json
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: bump Slidecaster pluginmaster.json to ${{ steps.version.outputs.SHORT }}"
          git fetch origin main
          git rebase -X theirs origin/main
          git push origin HEAD:refs/heads/main


