            -OutFile "$out\dalamud.zip"
          Expand-Archive -Path "$out\dalamud.zip" -DestinationPath $out -Force
          Remove-Item "$out\dalamud.zip"
          echo "DALAMUD_HOME=$out" >> $env:GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore ArmouryCleaner\ArmouryCleaner.csproj

      - name: Build Release
        run: dotnet build ArmouryCleaner\ArmouryCleaner.csproj --configuration Release --no-restore

      - name: Locate plugin zip
        id: find_zip
        shell: pwsh
