name: Build and Release

# Triggers on a version tag push: git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - 'v*'
      - 'ac-v*'
      - 'qn-v*'
      - 'sc-v*'
      - 'ba-v*'
      - 'cs-v*'

permissions:
  contents: write   # needed to create releases and push pluginmaster.json

jobs:
  build-and-release:
    if: "!startsWith(github.ref_name, 'ac-v') && !startsWith(github.ref_name, 'qn-v') && !startsWith(github.ref_name, 'sc-v') && !startsWith(github.ref_name, 'ba-v') && !startsWith(github.ref_name, 'cs-v')"
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so we can push back the manifest update

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Download Dalamud DLLs so Dalamud.NET.Sdk can resolve its references.
      # The SDK reads the DALAMUD_HOME env var as the lib path.
      - name: Download Dalamud
        shell: pwsh
        run: |
          $out = "${{ github.workspace }}\dalamud"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Invoke-WebRequest -Uri "https://github.com/goatcorp/dalamud-distrib/raw/main/latest.zip" `
            -OutFile "$out\dalamud.zip"
          Expand-Archive -Path "$out\dalamud.zip" -DestinationPath $out -Force
          Remove-Item "$out\dalamud.zip"
          echo "DALAMUD_HOME=$out" >> $env:GITHUB_ENV

      # NuGet restore uses nuget.config in the repo root.
      # Explicitly pass the project file so dotnet restore only restores
      # UndercutterFFXIV.csproj and does not discover/restore subdirectory
      # projects (ArmouryCleaner, QuestNav) which could confuse the build.
      - name: Restore dependencies
        run: dotnet restore UndercutterFFXIV.csproj

      - name: Build Release
        run: dotnet build UndercutterFFXIV.csproj --configuration Release --no-restore

      # DalamudPackager (included in Dalamud.NET.Sdk) creates a zip at:
      #   bin\Release\UndercutterFFXIV\latest.zip
      - name: Locate plugin zip
        id: find_zip
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path "bin\Release" -Recurse -Filter "latest.zip" |
            Select-Object -First 1
          if (-not $zip) {
            Write-Host "Contents of bin\Release:"
            Get-ChildItem "bin\Release" -Recurse | Select-Object FullName | Format-List
            throw "Could not find latest.zip under bin\Release -- DalamudPackager may not have run."
          }
          Write-Host "Found zip: $($zip.FullName)"
          echo "ZIP_PATH=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      # Strip the leading 'v' so  v1.2.3 -> 1.2.3.0
      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.3
          $ver = $tag.TrimStart('v')               # e.g. 1.2.3
          # Dalamud wants 4-part version
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $full = $parts -join '.'
          echo "SHORT=$ver"   >> $env:GITHUB_OUTPUT
          echo "FULL=$full"   >> $env:GITHUB_OUTPUT

      # Update pluginmaster.json with new version + current Unix timestamp, then
      # commit it back to main so the raw URL always reflects the latest release.
      - name: Update pluginmaster.json
        shell: pwsh
        run: |
          # Use JSON parsing and target only the UndercutterFFXIV entry so the
          # ArmouryCleaner entry is left untouched.
          $arr   = Get-Content pluginmaster.json -Raw | ConvertFrom-Json
          $entry = $arr | Where-Object { $_.InternalName -eq "UndercutterFFXIV" }
          $ver   = "${{ steps.version.outputs.FULL }}"
          $tag   = "${{ github.ref_name }}"
          $dlUrl = "https://github.com/Aschmies/AschyQOL/releases/download/$tag/UndercutterFFXIV-$tag.zip"
          $entry.AssemblyVersion        = $ver
          $entry.TestingAssemblyVersion = $ver
          $entry.LastUpdated            = [System.DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $entry.DownloadLinkInstall    = $dlUrl
          $entry.DownloadLinkUpdate     = $dlUrl
          $entry.DownloadLinkTesting    = $dlUrl
          $json = ConvertTo-Json -InputObject $arr -Depth 10
          [System.IO.File]::WriteAllText("$PWD\pluginmaster.json", $json, [System.Text.Encoding]::UTF8)

      # Rename latest.zip to UndercutterFFXIV-vX.X.X.zip so the asset has a
      # stable versioned name that matches the DownloadLinkInstall URL in pluginmaster.json.
      - name: Rename zip for release
        id: rename_zip
        shell: pwsh
        run: |
          $src  = "${{ steps.find_zip.outputs.ZIP_PATH }}"
          $dest = Join-Path (Split-Path $src) "UndercutterFFXIV-${{ github.ref_name }}.zip"
          Rename-Item $src $dest
          Write-Host "Renamed to: $dest"
          echo "RELEASE_ZIP=$dest" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ### Market Assistant ${{ steps.version.outputs.SHORT }}

            **Install:** Add the custom repo URL to Dalamud (see README), then install "Market Assistant".
            **Update:** Click the Update button next to the plugin in the Dalamud plugin installer.
          files: ${{ steps.rename_zip.outputs.RELEASE_ZIP }}
          fail_on_unmatched_files: true

      - name: Commit updated pluginmaster.json
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: bump pluginmaster.json to ${{ steps.version.outputs.SHORT }}"
          # Rebase on any commits that landed on main while CI was building (e.g. a developer push).
          # -X theirs auto-resolves conflicts by preferring the replayed commit (CI's update).
          git fetch origin main
          git rebase -X theirs origin/main
          # Push to main regardless of whether we're on a detached HEAD during a tag build
          git push origin HEAD:refs/heads/main

